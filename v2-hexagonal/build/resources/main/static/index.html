<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Commerce</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 1.5rem;
      background: #f5f5f5;
      color: #222;
    }

    h1 { font-size: 1.6rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.2rem; margin: 0 0 0.75rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
      color: #555;
    }

    input {
      width: 100%;
      padding: 0.45rem 0.6rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }

    input:focus { outline: 2px solid #4f7ef8; border-color: transparent; }

    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 5px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .btn-primary { background: #4f7ef8; color: #fff; }
    .btn-primary:hover { background: #3a68e0; }
    .btn-success { background: #28a745; color: #fff; font-size: 0.8rem; padding: 0.3rem 0.7rem; }
    .btn-success:hover { background: #218838; }

    .msg {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      min-height: 1.1rem;
    }
    .msg.ok { color: #28a745; }
    .msg.err { color: #dc3545; }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { text-align: left; border-bottom: 2px solid #eee; padding: 0.4rem 0.5rem; color: #444; }
    td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    .status-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-PENDENTE { background: #fff3cd; color: #856404; }
    .status-PAGO { background: #d1e7dd; color: #0a3622; }
    .status-CANCELADO { background: #f8d7da; color: #58151c; }

    .list-section h2 { display: flex; justify-content: space-between; align-items: center; }
    .list-section h2 button { font-size: 0.75rem; padding: 0.25rem 0.6rem; background: #e9ecef; color: #333; }
    .list-section h2 button:hover { background: #dee2e6; }

    .empty { color: #999; font-size: 0.85rem; text-align: center; padding: 1rem 0; }
  </style>
</head>
<body>
  <h1>🛒 Mini Commerce</h1>

  <div class="grid">
    <!-- Criar Produto -->
    <div class="card">
      <h2>Novo Produto</h2>
      <form id="form-produto">
        <label for="p-nome">Nome</label>
        <input id="p-nome" type="text" placeholder="Ex: Notebook" required />

        <label for="p-preco">Preço (R$)</label>
        <input id="p-preco" type="number" step="0.01" min="0.01" placeholder="Ex: 299.90" required />

        <label for="p-estoque">Estoque</label>
        <input id="p-estoque" type="number" min="0" placeholder="Ex: 10" required />

        <button type="submit" class="btn-primary">Cadastrar Produto</button>
        <div id="msg-produto" class="msg"></div>
      </form>
    </div>

    <!-- Criar Pedido -->
    <div class="card">
      <h2>Novo Pedido</h2>
      <form id="form-pedido">
        <label for="ped-nome">Nome do Cliente</label>
        <input id="ped-nome" type="text" placeholder="Ex: Maria Silva" required />

        <label for="ped-cpf">CPF</label>
        <input id="ped-cpf" type="text" placeholder="Ex: 123.456.789-00" required />

        <label for="ped-ids">IDs dos Produtos (separados por vírgula)</label>
        <input id="ped-ids" type="text" placeholder="Ex: 1, 2, 3" required />

        <button type="submit" class="btn-primary">Criar Pedido</button>
        <div id="msg-pedido" class="msg"></div>
      </form>
    </div>

    <!-- Lista de Produtos -->
    <div class="card list-section">
      <h2>
        Produtos
        <button type="button" onclick="carregarProdutos()">↺ Atualizar</button>
      </h2>
      <div id="lista-produtos"><p class="empty">Carregando…</p></div>
    </div>

    <!-- Lista de Pedidos -->
    <div class="card list-section">
      <h2>
        Pedidos
        <button type="button" onclick="carregarPedidos()">↺ Atualizar</button>
      </h2>
      <div id="lista-pedidos"><p class="empty">Carregando…</p></div>
    </div>
  </div>

  <script>
    // ── Helpers ────────────────────────────────────────────────────────────
    function setMsg(id, text, isError) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + (isError ? 'err' : 'ok');
    }

    async function apiFetch(url, options) {
      const res = await fetch(url, options);
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        const detail = body.message || body.error || JSON.stringify(body);
        throw new Error(detail || `HTTP ${res.status}`);
      }
      return body;
    }

    // ── Criar Produto ──────────────────────────────────────────────────────
    document.getElementById('form-produto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nome = document.getElementById('p-nome').value.trim();
      const preco = parseFloat(document.getElementById('p-preco').value);
      const quantidadeEstoque = parseInt(document.getElementById('p-estoque').value, 10);

      try {
        const produto = await apiFetch('/api/produtos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, preco, quantidadeEstoque })
        });
        setMsg('msg-produto', `✔ Produto "${produto.nome}" criado (ID ${produto.id}).`, false);
        e.target.reset();
        carregarProdutos();
      } catch (err) {
        setMsg('msg-produto', `✖ Erro: ${err.message}`, true);
      }
    });

    // ── Criar Pedido ───────────────────────────────────────────────────────
    document.getElementById('form-pedido').addEventListener('submit', async (e) => {
      e.preventDefault();
      const clienteNome = document.getElementById('ped-nome').value.trim();
      const clienteCpf = document.getElementById('ped-cpf').value.trim();
      const rawIds = document.getElementById('ped-ids').value;
      const produtoIds = rawIds.split(',')
        .map(s => parseInt(s.trim(), 10))
        .filter(n => !isNaN(n));

      if (produtoIds.length === 0) {
        setMsg('msg-pedido', '✖ Informe pelo menos um ID de produto válido.', true);
        return;
      }

      try {
        const pedido = await apiFetch('/api/pedidos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clienteNome, clienteCpf, produtoIds })
        });
        setMsg('msg-pedido', `✔ Pedido #${pedido.id} criado — Total: R$ ${Number(pedido.valorTotal).toFixed(2)}.`, false);
        e.target.reset();
        carregarPedidos();
      } catch (err) {
        setMsg('msg-pedido', `✖ Erro: ${err.message}`, true);
      }
    });

    // ── Pagar Pedido ───────────────────────────────────────────────────────
    async function pagarPedido(id) {
      try {
        await apiFetch(`/api/pedidos/${id}/pagar`, { method: 'PATCH' });
        carregarPedidos();
      } catch (err) {
        alert(`Erro ao pagar pedido #${id}: ${err.message}`);
      }
    }

    // ── Carregar Produtos ──────────────────────────────────────────────────
    async function carregarProdutos() {
      const container = document.getElementById('lista-produtos');
      try {
        const produtos = await apiFetch('/api/produtos');
        if (!produtos.length) {
          container.innerHTML = '<p class="empty">Nenhum produto cadastrado.</p>';
          return;
        }
        container.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Nome</th><th>Preço</th><th>Estoque</th>
              </tr>
            </thead>
            <tbody>
              ${produtos.map(p => `
                <tr>
                  <td>${p.id}</td>
                  <td>${escHtml(p.nome)}</td>
                  <td>R$ ${Number(p.preco).toFixed(2)}</td>
                  <td>${p.quantidadeEstoque}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      } catch (err) {
        container.innerHTML = `<p class="empty err">Erro ao carregar produtos: ${escHtml(err.message)}</p>`;
      }
    }

    // ── Carregar Pedidos ───────────────────────────────────────────────────
    async function carregarPedidos() {
      const container = document.getElementById('lista-pedidos');
      try {
        const pedidos = await apiFetch('/api/pedidos');
        if (!pedidos.length) {
          container.innerHTML = '<p class="empty">Nenhum pedido realizado.</p>';
          return;
        }
        container.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Cliente</th><th>Status</th><th>Total</th><th></th>
              </tr>
            </thead>
            <tbody>
              ${pedidos.map(ped => {
                const statusClass = `status-badge status-${ped.status}`;
                const podePagar = ped.status === 'PENDENTE';
                return `
                  <tr>
                    <td>${ped.id}</td>
                    <td>${escHtml(ped.clienteNome || (ped.cliente && ped.cliente.nome) || '')}</td>
                    <td><span class="${statusClass}">${ped.status}</span></td>
                    <td>R$ ${Number(ped.valorTotal).toFixed(2)}</td>
                    <td>
                      ${podePagar
                        ? `<button class="btn-success" onclick="pagarPedido(${ped.id})">Pagar</button>`
                        : '—'}
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>`;
      } catch (err) {
        container.innerHTML = `<p class="empty err">Erro ao carregar pedidos: ${escHtml(err.message)}</p>`;
      }
    }

    // ── Utilitário anti-XSS ────────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Carga inicial ──────────────────────────────────────────────────────
    carregarProdutos();
    carregarPedidos();
  </script>
</body>
</html>
